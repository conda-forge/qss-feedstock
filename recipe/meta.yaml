{% set name = "qss" %}
{% set version = "0.2.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/qss-{{ version }}.tar.gz
  sha256: 46726813f28442d57567096aa9b13e6c425eec5c45b87c48d2f8e186afea420a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy ==1.13.1
    - qdldl-python
    - cvxpy
    - matplotlib-base

test:
  imports:
    - qss
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/cvxgrp/qss
  summary: 'QSS: Quadratic-Separable Solver'
  dev_url: https://github.com/cvxgrp/qss
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pluflou
